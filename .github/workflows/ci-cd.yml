name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest -q

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: book-pro:ci

  release:
    name: Release
    needs: [test, build]
    if: github.event_name == 'release' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release metadata
        id: prep
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION_TAG="${{ github.event.release.tag_name }}"
          else
            VERSION_TAG="${GITHUB_REF_NAME}"
          fi
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "repo_name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ steps.prep.outputs.repo_name }}:${{ steps.prep.outputs.version_tag }}
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ steps.prep.outputs.repo_name }}:latest

      - name: Create GitHub release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image published:
            - ghcr.io/${{ steps.prep.outputs.owner_lc }}/${{ steps.prep.outputs.repo_name }}:${{ steps.prep.outputs.version_tag }}
